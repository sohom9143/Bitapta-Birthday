<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Bitapta 💖</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Satisfy&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* Starts with a soft, mysterious pinkish-dark theme */
            background-color: #2a1b2e; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            transition: background 2s ease-in-out;
            font-family: 'Poppins', sans-serif;
        }

        /* The Aesthetic Rose-Gold/Pastel Gradient after tapping */
        body.party-mode {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            background-size: 400% 400%;
            animation: gradientShift 6s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #gift-container {
            text-align: center;
            cursor: pointer;
            z-index: 20;
        }

        .instruction {
            color: #f8a5c2;
            font-size: 1.2rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        .gift-box {
            font-size: 7rem;
            filter: drop-shadow(0 0 15px rgba(255, 105, 180, 0.4));
            animation: floatBox 3s ease-in-out infinite;
        }

        @keyframes floatBox {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }

        #surprise-content {
            display: none;
            text-align: center;
            color: #4a4a4a;
            z-index: 10;
            padding: 20px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 20px;
        }

        #surprise-content.show {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        h1 {
            font-family: 'Satisfy', cursive;
            font-size: 4rem;
            color: #d81b60;
            text-shadow: 2px 2px 5px rgba(255,255,255,0.8);
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.4);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: #333;
            max-width: 90%;
            margin: 0 auto;
        }

        /* Polaroid Photo Gallery */
        .gallery {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .polaroid {
            background: white;
            padding: 10px 10px 20px 10px;
            border-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transform: translateY(50px) rotate(var(--rotate));
            opacity: 0;
            transition: all 1s ease var(--delay);
            width: 140px;
        }

        .polaroid img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 3px;
        }

        .polaroid p.caption {
            background: none;
            border: none;
            padding: 5px 0 0 0;
            font-size: 0.8rem;
            font-family: 'Satisfy', cursive;
            color: #d81b60;
            text-align: center;
        }

        #surprise-content.show .polaroid {
            opacity: 1;
            transform: translateY(0) rotate(var(--rotate));
        }

        .polaroid:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 30;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        /* Floating background hearts */
        .heart {
            position: absolute;
            font-size: 1.5rem;
            color: rgba(255, 105, 180, 0.5);
            animation: floatUp 4s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bg-music">
        <source src="your-song.mp3" type="audio/mpeg">
    </audio>

    <div id="gift-container" onclick="triggerSurprise()">
        <div class="instruction">Tap the magic box...</div>
        <div class="gift-box">🎁</div>
    </div>

    <div id="surprise-content">
        <h1>Happy Birthday,<br>Bitapta! 🌸</h1>
        <p>You make the world so much brighter! Here is to amazing memories, lots of laughs, and a fantastic year ahead! ✨</p>
        
        <div class="gallery">
            <div class="polaroid" style="--delay: 0.5s; --rotate: -6deg;">
                <img src="https://raw.githubusercontent.com/sohom9143/Bitapta-Birthday/main/Screenshot_20260421_003324_Instagram.jpg" alt="Memory 1">
                <p class="caption">Best times! 💖</p>
            </div>
            <div class="polaroid" style="--delay: 0.8s; --rotate: 5deg;">
                <img src="https://raw.githubusercontent.com/sohom9143/Bitapta-Birthday/main/Screenshot_20260421_003250_Instagram.jpg" alt="Memory 2">
                <p class="caption">Always laughing 😂</p>
            </div>
            <div class="polaroid" style="--delay: 1.1s; --rotate: -3deg;">
                <img src="https://raw.githubusercontent.com/sohom9143/Bitapta-Birthday/main/Screenshot_20260421_003221_Instagram.jpg" alt="Memory 3">
                <p class="caption">You're the best! 🌟</p>
            </div>
        </div>
    </div>

    <script>
        function triggerSurprise() {
            // 1. Play the music! 
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Audio waiting for interaction"));

            // 2. Hide gift, change background
            document.getElementById('gift-container').style.display = 'none';
            document.body.classList.add('party-mode');
            
            // 3. Show message and polaroids
            const surprise = document.getElementById('surprise-content');
            surprise.classList.add('show');

            // 4. Elegant Rose-Gold Confetti
            var duration = 4 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 50, colors: ['#ff9a9e', '#fecfef', '#ffffff', '#ffb6c1'] };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            // 5. Generate floating hearts in the background
            for (let i = 0; i < 15; i++) {
                setTimeout(createHeart, i * 300);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '🤍';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(heart);
            
            // Remove heart after animation to keep the phone running smoothly
            setTimeout(() => { heart.remove(); }, 5000);
        }
    </script>
</body>
</html>
